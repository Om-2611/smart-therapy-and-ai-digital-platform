# Fly.io config for the standalone STT relay.
# Deploy from inside relay/: fly launch --no-deploy (first time), then fly deploy
app = "staad-stt-relay"
primary_region = "bom"  # Mumbai — closest to India-based sessions

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"
